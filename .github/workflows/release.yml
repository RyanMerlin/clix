name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  attestations: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo test --workspace --all-features

  build:
    name: build (${{ matrix.artifact }})
    needs: test
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: linux-aarch64
            cross_apt: gcc-aarch64-linux-gnu
            cross_linker: aarch64-linux-gnu-gcc

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: darwin-aarch64

          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: darwin-x86_64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install cross-compile toolchain
        if: matrix.cross_apt != ''
        run: sudo apt-get install -y ${{ matrix.cross_apt }}

      - name: Build
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross_linker }}
          CC_aarch64_unknown_linux_gnu: ${{ matrix.cross_linker }}
        run: |
          cargo build --release --target ${{ matrix.target }} \
            -p clix-cli -p clix-serve -p clix-worker -p clix-broker -p clix-shim

      - name: Bundle
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          ARTIFACT="clix-${VERSION}-${{ matrix.artifact }}"
          BINDIR="target/${TARGET}/release"

          mkdir -p staging
          for bin in clix clix-serve clix-worker clix-broker clix-shim; do
            cp "${BINDIR}/${bin}" staging/
          done

          tar czf "${ARTIFACT}.tar.gz" -C staging .

          PYTHON_BIN="$(command -v python3 || command -v python)"
          "$PYTHON_BIN" -c '
          import hashlib, pathlib, sys
          p = pathlib.Path(sys.argv[1])
          print(hashlib.sha256(p.read_bytes()).hexdigest() + "  " + p.name)
          ' "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"

          echo "ARTIFACT=${ARTIFACT}" >> "$GITHUB_ENV"

      - name: Install syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Generate SBOM
        run: |
          syft "${{ env.ARTIFACT }}.tar.gz" -o spdx-json="${{ env.ARTIFACT }}.tar.gz.spdx.json"

      - name: Attest tarball
        uses: actions/attest@v2
        with:
          subject-path: ${{ env.ARTIFACT }}.tar.gz
          sbom-path: ${{ env.ARTIFACT }}.tar.gz.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clix-${{ matrix.artifact }}
          path: |
            ${{ env.ARTIFACT }}.tar.gz
            ${{ env.ARTIFACT }}.tar.gz.sha256
            ${{ env.ARTIFACT }}.tar.gz.spdx.json

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: dist/**/*
