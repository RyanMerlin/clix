name: gcloud.aiplatform.endpoints.describe
version: 1
description: "Describe a Vertex AI endpoint"
backend:
  type: subprocess
  command: gcloud
  args:
    - ai
    - endpoints
    - describe
    - "{{ inputs.endpoint_id }}"
    - "--project={{ inputs.project }}"
    - "--region={{ inputs.region }}"
    - "--format=json"
risk: low
sideEffectClass: read-only
inputSchema:
  type: object
  required: [project, region, endpoint_id]
  properties:
    project:
      type: string
      description: "GCP project ID"
    region:
      type: string
      description: "GCP region (e.g. us-central1)"
    endpoint_id:
      type: string
      description: "Vertex AI endpoint ID"
