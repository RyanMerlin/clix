# cargo-audit configuration — RUSTSEC advisory exceptions
# https://docs.rs/cargo-audit/latest/cargo_audit/config/index.html

[advisories]
ignore = [
    # RUSTSEC-2023-0071 — "Marvin Attack: potential key recovery through
    # timing sidechannels" in the `rsa` crate.
    #
    # Status: no patched version available — fundamental algorithmic issue
    # being tracked upstream (https://rustsec.org/advisories/RUSTSEC-2023-0071).
    #
    # Used by: clix-broker (PEM-based key handling).
    #
    # Risk assessment: the attack requires an adversary to time RSA
    # decryption operations across a network. clix-broker performs key
    # operations locally, not over an exposed decryption oracle. Threat
    # model accepts the residual risk; revisit when a patched version ships.
    "RUSTSEC-2023-0071",
]
