---
document: clix-core-ops
version: 1
description: >
  Technical design reference for clix core operations — how the system works
  internally, how external CLIs are integrated, and how to create and manage
  profiles and packs.

# ─────────────────────────────────────────────────────────────────────────────
# DIRECTORY LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
filesystem:
  root: "~/.clix  (override with CLIX_HOME env var)"
  structure:
    config.yaml:       "Main configuration — active profiles, approval mode, env, sandbox"
    policy.yaml:       "Policy rules — allow/deny/require-approval per capability/profile/risk"
    capabilities/:     "Capability manifests (.yaml) — one file per capability"
    profiles/:         "Profile manifests (.yaml) — one file per profile"
    workflows/:        "Workflow manifests (.yaml)"
    packs/:            "Installed packs — each pack gets its own subdirectory"
    receipts.db:       "SQLite audit log of every capability execution"
    bundles/:          "Pack bundle staging area"
    bundles/published/: "Published .clixpack.zip + .clixpack.sha256 sidecar files"
    cache/:            "Runtime cache"


# ─────────────────────────────────────────────────────────────────────────────
# CONFIGURATION
# ─────────────────────────────────────────────────────────────────────────────
configuration:
  file: ~/.clix/config.yaml
  fields:
    schema_version:   "u32 — manifest format version (default: 1)"
    approval_mode:
      type: enum
      values:
        Auto:            "Low/Medium risk auto-approved; High/Critical require approval"
        Interactive:     "Prompt user for approval on every execution"
        AlwaysRequire:   "Every capability requires explicit approval"
    default_env:       "String — environment context label (default: 'default')"
    workspace_root:    "Optional path — project root for resolving relative cwd_from_input"
    active_profiles:   "List of profile names currently enabled"
    infisical:
      description:     "Optional Infisical secret manager connection"
      fields:
        project_id:    "Infisical project UUID"
        environment:   "Environment slug (e.g. dev, prod)"
        client_id:     "Machine identity client ID"
        client_secret: "Machine identity client secret"
    approval_gate:
      description:     "Optional webhook endpoint for external approval decisions"
      fields:
        url:           "Webhook URL — receives approval request, returns allow/deny"
    sandbox:
      enabled:         "bool — whether sandbox enforcement is active"
      allowed_executables: "List of binary names permitted to execute"


# ─────────────────────────────────────────────────────────────────────────────
# CAPABILITIES
# ─────────────────────────────────────────────────────────────────────────────
capabilities:
  description: >
    A capability is a single named operation — a thin policy-enforced wrapper
    around an external CLI command, built-in function, or remote API call.
    Each capability lives as a YAML file in ~/.clix/capabilities/.

  manifest_fields:
    name:              "Unique dot-namespaced identifier (e.g. gcloud.aiplatform.models.list)"
    version:           "u32"
    description:       "Optional human-readable summary"
    backend:
      type: enum
      variants:
        Subprocess:
          description: "Runs an external CLI command as a subprocess"
          fields:
            command:         "Executable name (e.g. gcloud, kubectl, aws)"
            args:            "Argument list — may reference inputs via $VAR or ${VAR} syntax"
            cwd_from_input:  "Optional — JSON path in input that sets the working directory"
        Builtin:
          description: "Executes a built-in clix function"
          fields:
            name:            "Built-in name (e.g. echo, noop)"
        Remote:
          description: "Calls a remote HTTP endpoint"
          fields:
            url:             "Target URL"
    risk:
      type: enum
      values: [Low, Medium, High, Critical]
      description: "Governs default approval behavior when no policy rule matches"
    side_effect_class:
      type: enum
      values: [None, ReadOnly, Additive, Mutating, Destructive]
      description: "Semantic classification of what the capability does to state"
    input_schema:      "JSON Schema object — validated against user-supplied inputs at runtime"
    validators:
      description:     "Additional pre-execution input validation rules"
      fields:
        kind:          "RequiredPath | DenyArgs | RequiredInputKey"
        path:          "JSON path within input to inspect"
        key:           "Input key name (for RequiredInputKey)"
        values:        "List of disallowed values (for DenyArgs)"
    credentials:
      description:     "Secrets injected as environment variables before subprocess execution"
      variants:
        Env:
          env_var:     "Name of existing env var to forward"
          inject_as:   "Name to expose inside the subprocess"
        Literal:
          value:       "Hardcoded secret value (avoid in production)"
          inject_as:   "Name to expose inside the subprocess"
        Infisical:
          secret_ref:
            key:       "Infisical secret key name"
            path:      "Folder path within Infisical project"
          inject_as:   "Name to expose inside the subprocess"
    sandbox_profile:   "Optional reference to a sandbox configuration"
    approval_policy:   "Optional override for capability-level approval rule"

  example:
    name: gcloud.aiplatform.models.list
    version: 1
    description: List Vertex AI models in a GCP project
    backend:
      Subprocess:
        command: gcloud
        args: [ai, models, list, "--project=${project}", "--region=${region}", "--format=json"]
    risk: Low
    side_effect_class: ReadOnly
    input_schema:
      type: object
      properties:
        project: { type: string }
        region:  { type: string, default: us-central1 }
      required: [project]
    credentials:
      - Infisical:
          secret_ref: { key: GCP_SERVICE_ACCOUNT, path: /gcloud }
          inject_as: GOOGLE_APPLICATION_CREDENTIALS


# ─────────────────────────────────────────────────────────────────────────────
# EXTERNAL CLI INTEGRATION — HOW SUBPROCESS BACKEND WORKS
# ─────────────────────────────────────────────────────────────────────────────
external_cli_integration:
  description: >
    The Subprocess backend is how clix wraps any external CLI tool (gcloud,
    kubectl, aws, terraform, etc.) into a policy-controlled, audited capability.

  execution_flow:
    1_policy_check:
      description: >
        Before anything executes, clix evaluates policy rules in order.
        The ExecutionContext (env, profile, user, cwd) is matched against
        each PolicyRule. First match wins. If no rule matches, risk level
        determines the default: Low/Medium auto-allow, High/Critical require approval.

    2_input_validation:
      description: >
        User-supplied inputs are validated against the capability's input_schema
        (JSON Schema). Validators (RequiredPath, DenyArgs, RequiredInputKey)
        run next. Any failure aborts execution and writes a Denied receipt.

    3_credential_resolution:
      description: >
        Credential sources are resolved in order:
        - Env sources: forwarded from the current process environment
        - Literal sources: injected directly
        - Infisical sources: fetched from the Infisical API using the configured
          machine identity, then cached for the session
        Result: a HashMap<String, String> of name→value pairs.

    4_arg_expansion:
      description: >
        The args list is scanned for $VAR and ${VAR} references. Each is
        substituted from the resolved inputs + credentials map.
        Example: ["--project=${project}"] becomes ["--project=my-gcp-project"]

    5_subprocess_spawn:
      description: >
        The command is spawned with a clean environment — system env is cleared
        and replaced with only the injected variables. On Windows, if the initial
        spawn fails, clix automatically retries with a .cmd extension appended.
        cwd_from_input (if set) extracts a directory path from the input JSON
        and uses it as the working directory.

    6_output_capture:
      description: >
        stdout and stderr are captured as UTF-8 strings. exit_code is recorded.
        SubprocessResult { exit_code, stdout, stderr } is returned.

    7_receipt_write:
      description: >
        Regardless of outcome, a Receipt is written to receipts.db containing:
        the capability name, inputs, execution context, result, status, and
        whether sandbox was enforced.

  credential_injection_example:
    capability_credentials:
      - Infisical:
          secret_ref: { key: AWS_ACCESS_KEY_ID, path: /aws }
          inject_as: AWS_ACCESS_KEY_ID
      - Infisical:
          secret_ref: { key: AWS_SECRET_ACCESS_KEY, path: /aws }
          inject_as: AWS_SECRET_ACCESS_KEY
    result: >
      Subprocess sees AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in its
      environment — identical to a user having run `export` manually, but
      fetched from Infisical at runtime and never stored on disk.


# ─────────────────────────────────────────────────────────────────────────────
# PROFILES
# ─────────────────────────────────────────────────────────────────────────────
profiles:
  description: >
    A profile is a named collection of capabilities and workflows. Activating
    a profile makes those capabilities available in the dynamic CLI tree and
    MCP tools list. Multiple profiles can be active simultaneously.

  manifest_fields:
    name:          "Unique identifier"
    version:       "u32"
    description:   "Optional"
    capabilities:  "List of capability names included in this profile"
    workflows:     "List of workflow names included in this profile"
    settings:      "Arbitrary JSON — profile-level configuration passed to capabilities"

  example:
    name: gcp-platform
    version: 1
    description: Google Cloud Platform operations for platform team
    capabilities:
      - gcloud.aiplatform.models.list
      - gcloud.aiplatform.jobs.run
      - gcloud.storage.buckets.list
    workflows:
      - deploy-model
    settings:
      default_project: my-gcp-project
      default_region: us-central1

  lifecycle:
    activate:   "clix profile activate <name> — adds to active_profiles in config.yaml"
    deactivate: "clix profile deactivate <name> — removes from active_profiles"
    list:       "clix profile list — shows all profiles, * marks active ones"
    show:       "clix profile show <name> — shows manifest details"
    via_tui:    "clix tui → Profiles screen → Enter to toggle"


# ─────────────────────────────────────────────────────────────────────────────
# PACKS
# ─────────────────────────────────────────────────────────────────────────────
packs:
  description: >
    A pack is a distributable bundle containing capabilities, profiles, and
    workflows for a specific tool or domain. Packs are the unit of sharing —
    you author a pack locally, bundle it to a .clixpack.zip, and install it
    on other machines or share with a team.

  manifest_fields:
    name:          "Unique pack identifier (e.g. gcloud-platform)"
    version:       "u32"
    description:   "Optional"
    author:        "Optional author name"
    homepage:      "Optional documentation URL"
    capabilities:  "List of capability names shipped in this pack"
    profiles:      "List of profile names shipped in this pack"
    workflows:     "List of workflow names shipped in this pack"

  directory_structure:
    description: "An installed pack lives at ~/.clix/packs/<pack-name>/"
    layout:
      pack.yaml:        "The pack manifest"
      capabilities/:    "Capability YAML files"
      profiles/:        "Profile YAML files"
      workflows/:       "Workflow YAML files"

  lifecycle:
    scaffold:
      command: "clix pack scaffold <name> [--preset <preset>] [--command <cmd>]"
      description: >
        Generates a starter pack directory with a pack.yaml manifest and
        example capability file. Use --preset to pick a starting template
        and --command to pre-fill the subprocess command.

    authoring:
      description: >
        Edit capabilities/*.yaml and profiles/*.yaml in the scaffolded directory.
        Each capability file is a CapabilityManifest YAML. Each profile file is
        a ProfileManifest YAML referencing the capability names in this pack.

    validate:
      command: "clix pack validate <path>"
      description: >
        Parses the pack directory and reports any schema errors in the manifests.
        Run this before bundling.

    discover:
      command: "clix pack discover <path>"
      description: >
        Scans a directory for any clix-compatible manifests and reports what
        it finds. Useful for onboarding an existing tool collection.

    diff:
      command: "clix pack diff <installed-name> <new-path>"
      description: >
        Compares an installed pack against a new version. Shows added, removed,
        and changed capabilities/profiles.

    bundle:
      command: "clix pack bundle <path>"
      description: >
        Zips the pack directory into a .clixpack.zip file and writes a
        .clixpack.sha256 sidecar with the file hash for integrity verification.

    install:
      command: "clix pack install <path-or-zip>"
      description: >
        Installs a pack from a local directory or .clixpack.zip file.
        Extracts to ~/.clix/packs/<pack-name>/. All capabilities and profiles
        in the pack become available immediately.

    publish:
      command: "clix pack publish <path>"
      description: >
        Bundles the pack and copies it to ~/.clix/bundles/published/ with an
        updated index.json. This is local publishing — for team distribution,
        copy the .clixpack.zip to a shared location.

    onboard:
      command: "clix pack onboard <name> <command>"
      description: >
        Wizard-style scaffolding that introspects an external CLI (by running
        its --help output) and generates a starter pack for it automatically.

    list:   "clix pack list — shows installed packs"
    show:   "clix pack show <name> — shows pack manifest and contents"


# ─────────────────────────────────────────────────────────────────────────────
# POLICY
# ─────────────────────────────────────────────────────────────────────────────
policy:
  description: >
    Policy controls what can execute and under what conditions. Rules are
    evaluated in order; first match wins. The default action applies when
    no rule matches (fallback: auto-allow Low/Medium, require-approval High/Critical).

  file: ~/.clix/policy.yaml
  fields:
    default_action:
      type: enum
      values: [Allow, Deny, RequireApproval]
    rules:
      description: "Ordered list of PolicyRule entries"
      rule_fields:
        capability:       "Match a specific capability name (optional)"
        profile:          "Match a specific active profile (optional)"
        env:              "Match the default_env value (optional)"
        risk:             "Match risk level: low | medium | high | critical (optional)"
        side_effect_class: "Match side-effect class (optional)"
        action:           "Allow | Deny | RequireApproval"
        reason:           "Optional audit message recorded in the receipt"

  example:
    default_action: Allow
    rules:
      - risk: critical
        action: RequireApproval
        reason: All critical-risk operations require human review
      - capability: gcloud.storage.buckets.delete
        action: Deny
        reason: Bucket deletion is permanently disabled
      - env: production
        side_effect_class: Destructive
        action: RequireApproval
        reason: Destructive ops in production require approval


# ─────────────────────────────────────────────────────────────────────────────
# RECEIPT SYSTEM
# ─────────────────────────────────────────────────────────────────────────────
receipts:
  description: >
    Every capability execution — successful or not — produces a Receipt stored
    in receipts.db (SQLite). Receipts are the audit trail.

  fields:
    id:               "UUID — unique receipt identifier"
    kind:             "Capability | Workflow"
    capability:       "Name of the capability that ran"
    created_at:       "UTC timestamp"
    status:
      type: enum
      values:
        Succeeded:       "Execution completed with exit code 0"
        Failed:          "Execution completed with non-zero exit code"
        Denied:          "Policy denied execution before it started"
        PendingApproval: "Awaiting approval decision"
        ApprovalDenied:  "Approval was requested but denied"
    decision:         "allow | deny | require_approval — the policy decision"
    reason:           "Optional audit reason from the matching policy rule"
    input:            "JSON — the inputs supplied by the caller"
    context:          "JSON — ExecutionContext: env, profile, user, cwd"
    execution:        "Optional JSON — SubprocessResult: exit_code, stdout, stderr"
    approval:         "Optional JSON — approval decision metadata"
    sandbox_enforced: "bool — whether sandbox was active for this execution"

  commands:
    list:  "clix receipts list [--limit N] [--status <status>]"
    show:  "clix receipts show <id>"
    tail:  "clix receipts tail — live-tails the receipt log"
