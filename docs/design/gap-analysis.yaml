    sprint_2_navigation:
      - KB-01: "Left/right arrow tab switching"
      - KB-02: "Remove j/k"
      - KB-03: "Fix status bar hint text"
      - VIS-02: "Empty state messages on all screens"
      - VIS-01: "Rust orange tab highlight"

    sprint_3_create_flows:
      - CM-01: "Create profile from TUI"
      - CM-02: "Create capability from TUI"
      - CM-03: "Create/install pack from TUI"
