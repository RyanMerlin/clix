---
document: gap-analysis
version: 1
date: 2026-04-13
description: >
  Full gap analysis comparing current clix implementation against the intended
  design in clix-tui.yaml and clix-core-ops.yaml. Organized by area.
  Each gap has a severity, current state, desired state, and suggested action.

severity_legend:
  P0: "Blocking — breaks basic usability right now"
  P1: "High — significant missing feature or correctness issue"
  P2: "Medium — notable gap, degraded experience"
  P3: "Low — polish, completeness"


# ─────────────────────────────────────────────────────────────────────────────
# 1. FIRST-RUN / ONBOARDING
# ─────────────────────────────────────────────────────────────────────────────
first_run:

  - id: FR-01
    severity: P0
    area: onboarding
    title: "TUI opens empty — no profiles, no packs visible"
    current: >
      Packs exist in the source repo under packs/ but are never auto-installed.
      clix init does not install the base pack. The TUI shows blank lists on
      first launch, giving the impression the tool is broken.
    desired: >
      On first launch (or after clix init), the base pack is automatically
      installed to ~/.clix and the base profile is activated. The TUI opens
      with at least one profile and one pack visible immediately.
    action: >
      In clix init (or App::new() as a first-run guard): check if
      ~/.clix/packs/base/ exists; if not, run install_pack() against the
      bundled packs/base/ directory. Then activate the base profile if
      active_profiles is empty.
    files:
      - crates/clix-core/src/commands/init.rs
      - crates/clix-cli/src/tui/app.rs

  - id: FR-02
    severity: P1
    area: onboarding
    title: "No in-app discovery of starter packs"
    current: "User has no way to know about gcloud-readonly, kubectl-observe, gh-readonly packs from within the TUI"
    desired: >
      Packs screen (or a starter modal) shows available-but-not-installed packs
      from the repo with a one-key install action.
    action: >
      Add a bundled pack index (JSON/YAML list of known packs with install paths).
      Packs screen distinguishes installed vs available. 'i' key triggers install.
    files:
      - crates/clix-cli/src/tui/screens/packs.rs
      - packs/ (index file)


# ─────────────────────────────────────────────────────────────────────────────
# 2. TUI — KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
key_bindings:

  - id: KB-01
    severity: P1
    area: tui-navigation
    title: "Left/right arrow keys do not switch tabs"
    current: "Tab switches screens (cycles). Number keys 1/2/3 jump directly. Arrows only move the cursor."
    desired: "Left/right arrow keys switch tabs. Arrows never navigate the list (up/down do that)."
    action: >
      In App::handle_key(): add KeyCode::Left → previous_screen() and
      KeyCode::Right → next_screen(). Remove Tab as a screen switcher.
      Reserve Tab for modal field advancement only.
    files:
      - crates/clix-cli/src/tui/app.rs

  - id: KB-02
    severity: P1
    area: tui-navigation
    title: "j/k vim bindings still active — conflicts with intended UX"
    current: "j and k move the cursor in addition to up/down arrows."
    desired: "Only up/down arrow keys navigate lists. j/k removed. Simpler, unambiguous."
    action: "Remove KeyCode::Char('j') and KeyCode::Char('k') from cursor_down/cursor_up dispatch."
    files:
      - crates/clix-cli/src/tui/app.rs

  - id: KB-03
    severity: P2
    area: tui-navigation
    title: "Status bar still shows j/k hint"
    current: "Status bar shows 'j/k:navigate'"
    desired: "Status bar shows '←/→:tabs  ↑/↓:select  Enter:action  Esc:back'"
    action: "Update the help string in tui/mod.rs render()."
    files:
      - crates/clix-cli/src/tui/mod.rs


# ─────────────────────────────────────────────────────────────────────────────
# 3. TUI — VISUAL
# ─────────────────────────────────────────────────────────────────────────────
visual:

  - id: VIS-01
    severity: P3
    area: tui-style
    title: "Tab bar highlight color is yellow, not rust orange"
    current: "Active tab renders in Color::Yellow."
    desired: "Active tab renders in rust orange — closest ratatui approximation: Color::Rgb(231, 91, 42) or Color::Red as fallback for 16-color terminals."
    action: >
      In tui/mod.rs render(), change the Tabs highlight_style fg to
      Color::Rgb(231, 91, 42). Add a fallback: detect 256-color support
      and use Color::Red if unavailable.
    files:
      - crates/clix-cli/src/tui/mod.rs

  - id: VIS-02
    severity: P3
    area: tui-style
    title: "Empty screens show blank area with no guidance"
    current: "Empty profiles/packs list renders nothing — no hint to the user."
    desired: >
      Each empty screen shows a centered message:
      - Profiles: "No profiles installed — press n to create one"
      - Capabilities: "No capabilities loaded — install a pack or press n to create"
      - Packs: "No packs installed — press i to install or n to create"
    action: "Add empty_state rendering branch in each screen render function."
    files:
      - crates/clix-cli/src/tui/screens/profiles.rs
      - crates/clix-cli/src/tui/screens/capabilities.rs
      - crates/clix-cli/src/tui/screens/packs.rs


# ─────────────────────────────────────────────────────────────────────────────
# 4. TUI — CREATE/MANAGE FLOWS (MISSING FEATURES)
# ─────────────────────────────────────────────────────────────────────────────
create_manage:

  - id: CM-01
    severity: P1
    area: tui-profiles
    title: "Cannot create a profile from within the TUI"
    current: "Profiles screen is read-only — toggle only. No new profile creation."
    desired: >
      Press n on the Profiles screen to open a CreateProfile modal.
      Fields: name (required), description (optional), capabilities (optional comma list).
      On confirm: write ~/.clix/profiles/<name>.yaml and reload.
    action: >
      Add Modal enum to app.rs. Add CreateProfile variant.
      Add modal renderer in profiles.rs. Handle Tab/Enter/Esc in handle_key
      when modal is active. Write ProfileManifest to disk on confirm.
    files:
      - crates/clix-cli/src/tui/app.rs
      - crates/clix-cli/src/tui/screens/profiles.rs

  - id: CM-02
    severity: P1
    area: tui-capabilities
    title: "Cannot create a capability from within the TUI"
    current: "Capabilities screen is read-only — browse only."
    desired: >
      Press n on Capabilities (Namespaces level) to open CreateCapability modal.
      Fields: name (dot-namespaced), description, backend type (selector),
      command (for subprocess), args, risk level.
      On confirm: write ~/.clix/capabilities/<name>.yaml and reload registry.
    action: >
      Add CreateCapability modal variant to Modal enum.
      Add modal renderer in capabilities.rs.
      Write CapabilityManifest YAML to disk on confirm, reload registry.
    files:
      - crates/clix-cli/src/tui/app.rs
      - crates/clix-cli/src/tui/screens/capabilities.rs

  - id: CM-03
    severity: P1
    area: tui-packs
    title: "Cannot create or install a pack from within the TUI"
    current: "Packs screen is read-only — browse only. Enter is a no-op."
    desired: >
      n: Open CreatePack modal (name, description, author). Runs pack scaffold logic.
      i: Prompt for a local directory or .clixpack.zip path, runs install_pack().
      Enter: Open pack management view showing pack contents with install/remove actions.
    action: >
      Add CreatePack modal. Add install-path input prompt.
      Wire Enter on Packs to a PackDetail sub-view with management actions.
    files:
      - crates/clix-cli/src/tui/app.rs
      - crates/clix-cli/src/tui/screens/packs.rs


# ─────────────────────────────────────────────────────────────────────────────
# 5. PACK CONTENT GAPS
# ─────────────────────────────────────────────────────────────────────────────
pack_content:

  - id: PC-01
    severity: P0
    area: packs
    title: "base pack profile does not auto-activate on init"
    current: >
      packs/base/profiles/base.yaml exists but is never installed or activated
      automatically. New users have no active profile.
    desired: "clix init installs base pack and sets active_profiles: [base] in config.yaml."
    action: "Add base pack install + profile activation to init.rs."
    files:
      - crates/clix-cli/src/commands/init.rs
      - packs/base/

  - id: PC-02
    severity: P1
    area: packs
    title: "gcloud-aiplatform pack missing profile file"
    current: >
      packs/gcloud-aiplatform/ has 6 capability files and a pack.yaml but no
      profiles/ directory. The pack.yaml lists no profiles. Users cannot
      activate these capabilities via a profile.
    desired: >
      Add packs/gcloud-aiplatform/profiles/gcloud-aiplatform.yaml listing all
      6 capabilities. Add profiles: [gcloud-aiplatform] to pack.yaml.
    action: "Create the profile file and update pack.yaml."
    files:
      - packs/gcloud-aiplatform/pack.yaml
      - packs/gcloud-aiplatform/profiles/gcloud-aiplatform.yaml (new)

  - id: PC-03
    severity: P1
    area: packs
    title: "Inconsistent capability manifest schema across packs"
    current: >
      base pack uses:        backend.type: builtin, risk: low, sideEffectClass: none
      gcloud-aiplatform uses: backend.type: subprocess, risk: low, sideEffectClass: read-only
      kubectl-observe uses:   backend.type: subprocess, risk: low, sideEffectClass: readOnly
      gcloud-readonly uses:   backend.type: subprocess, risk: low, sideEffectClass: readOnly
      The sideEffectClass values are inconsistent (none / read-only / readOnly).
      The backend schema uses 'type:' key but the Rust struct uses a tagged enum.
    desired: >
      All manifests use the canonical Rust serde format. Check what
      serde_yaml actually deserializes from — likely snake_case enum tags.
      Standardize all packs to whichever format the code actually parses.
    action: >
      1. Check how Backend and SideEffectClass are serialized by running
         clix capabilities list on a working pack.
      2. Normalize all pack YAML files to match.
      3. Add clix pack validate to CI to catch schema drift.
    files:
      - packs/ (all capability YAML files)
      - crates/clix-core/src/manifest/capability.rs (check serde attrs)

  - id: PC-04
    severity: P2
    area: packs
    title: "kubectl-observe capabilities use {{ input.namespace }} template syntax"
    current: >
      kubectl.get-pods args: ["get", "pods", "-n", "{{ input.namespace }}"]
      gcloud-aiplatform uses: "--project={{ inputs.project }}"
      The Rust subprocess backend expands $VAR and ${VAR} syntax, not {{ }}.
    desired: "All capability args use ${input.namespace} / ${inputs.project} syntax consistently."
    action: "Update all pack capability files to use ${...} arg expansion syntax."
    files:
      - packs/kubectl-observe/capabilities/kubectl.get-pods.yaml
      - packs/kubectl-observe/capabilities/kubectl.get-nodes.yaml
      - packs/gcloud-aiplatform/capabilities/*.yaml

  - id: PC-05
    severity: P2
    area: packs
    title: "gcloud-aiplatform pack has no pack.yaml profiles or capabilities list"
    current: >
      packs/gcloud-aiplatform/pack.yaml has name, version, description, author,
      license — but no capabilities: or profiles: list. The pack is not
      self-describing and clix pack show will show empty content.
    desired: "Pack.yaml lists all 6 capability names under capabilities:."
    action: "Update packs/gcloud-aiplatform/pack.yaml."
    files:
      - packs/gcloud-aiplatform/pack.yaml

  - id: PC-06
    severity: P3
    area: packs
    title: "No git pack — user feedback requested git as a base example"
    current: "No git capabilities exist in any pack."
    desired: >
      A git-readonly pack with common read-only operations:
      git.status, git.log, git.diff, git.branch-list.
      These are safe (readOnly, low risk), universally available, and make
      a compelling demo for the TUI capability browser.
    action: "Create packs/git-readonly/ with pack.yaml, profile, and 4 capabilities."
    files:
      - packs/git-readonly/ (new)


# ─────────────────────────────────────────────────────────────────────────────
# 6. CORE / CLI GAPS
# ─────────────────────────────────────────────────────────────────────────────
core_cli:

  - id: CC-01
    severity: P1
    area: cli
    title: "clix init does not install any packs"
    current: "clix init creates the ~/.clix directory structure but installs nothing."
    desired: >
      clix init installs the base pack and activates the base profile so the
      tool is immediately usable after initialization.
    action: "Add pack install logic to init.rs. Install packs/base/ from the binary's bundled assets."
    files:
      - crates/clix-cli/src/commands/init.rs

  - id: CC-02
    severity: P2
    area: cli
    title: "No way to list available (not yet installed) packs"
    current: "clix pack list shows only installed packs. No discovery of bundled/available packs."
    desired: "clix pack list --available shows bundled packs not yet installed."
    action: "Add --available flag to pack list command. Scan packs/ directory in the binary."
    files:
      - crates/clix-cli/src/commands/pack.rs
      - crates/clix-cli/src/cli.rs

  - id: CC-03
    severity: P2
    area: cli
    title: "clix status gives no pack/profile summary"
    current: "clix status shows basic config but no summary of installed packs or active profiles."
    desired: >
      clix status shows: active profiles, installed pack count, capability count,
      and whether any packs need updating.
    action: "Extend status.rs to include pack/profile/capability summary."
    files:
      - crates/clix-cli/src/commands/status.rs


# ─────────────────────────────────────────────────────────────────────────────
# SUMMARY SCORECARD
# ─────────────────────────────────────────────────────────────────────────────
summary:
  total_gaps: 17
  by_severity:
    P0: 2   # FR-01, PC-01
    P1: 8   # FR-02, KB-01, KB-02, CM-01, CM-02, CM-03, PC-02, CC-01
    P2: 5   # KB-03, PC-03, PC-04, PC-05, CC-02, CC-03
    P3: 3   # VIS-01, VIS-02, PC-06

  recommended_order:
