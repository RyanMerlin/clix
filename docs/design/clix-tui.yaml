---
document: clix-tui
version: 2
description: >
  Technical design reference for the clix interactive TUI — architecture,
  screen designs, navigation model, and key bindings.
  Launch with: clix tui


# ─────────────────────────────────────────────────────────────────────────────
# OVERVIEW
# ─────────────────────────────────────────────────────────────────────────────
overview:
  purpose: >
    The TUI is the graphical face of clix for humans setting things up.
    It reads from the same Registry/Profile/Pack data layer as the headless
    CLI and MCP server — no separate data path. The TUI for humans configuring,
    the CLI/MCP for agents running.
  technology:
    terminal_backend: crossterm 0.28
    ui_framework:     ratatui 0.29
    async:            false  # synchronous — no tokio required for the TUI loop
  launch_command:    "clix tui"
  source_location:   "crates/clix-cli/src/tui/"


# ─────────────────────────────────────────────────────────────────────────────
# TERMINAL LIFECYCLE
# ─────────────────────────────────────────────────────────────────────────────
terminal_lifecycle:
  startup:
    order:
      1: "App::new() — load ClixState, CapabilityRegistry, profiles, packs from disk"
      2: "enable_raw_mode() — capture all keystrokes"
      3: "EnterAlternateScreen — switch to TUI buffer, preserving shell history"
      4: "Terminal::new(CrosstermBackend) — ratatui terminal handle"
      5: "Install panic hook — ensures terminal is restored even on unexpected crash"
      6: "Enter run_loop()"

  run_loop:
    description: "Synchronous draw → event → repeat until app.should_quit"
    steps:
      1: "terminal.draw(|f| render(f, &app)) — render current state to terminal"
      2: "event::read() — block until next input event"
      3: "Filter: only process KeyEventKind::Press (prevents double-fire on Windows)"
      4: "app.handle_key(key) — update state"
      5: "Check app.should_quit — break if true"

  shutdown:
    description: "Always runs — even after panic (via panic hook)"
    steps:
      1: "disable_raw_mode()"
      2: "LeaveAlternateScreen — restore original shell buffer"
      3: "terminal.show_cursor()"
    panic_safety: >
      A panic hook installed at startup calls disable_raw_mode() and
      LeaveAlternateScreen before printing the panic message, so the user's
      terminal is never left in a broken state.


# ─────────────────────────────────────────────────────────────────────────────
# APP STATE MACHINE
# ─────────────────────────────────────────────────────────────────────────────
state_machine:
  description: >
    All TUI state lives in the App struct. The renderer reads from App
    without mutating it. handle_key() is the only mutation point.

  app_struct:
    screen:          "Screen enum — which top-level screen is active"
    cap_view:        "CapView enum — drill-down level within the Capabilities screen"
    modal:           "Option<Modal> — active modal/form overlay (create profile, cap, pack)"
    profiles:        "Vec<ProfileManifest> — all profiles loaded from disk"
    active_profiles: "Vec<String> — names of currently active profiles (from config.yaml)"
    registry:        "CapabilityRegistry — all capabilities, grouped by namespace"
    packs:           "Vec<PackManifest> — all installed packs"
    cursor:          "usize — current list cursor position (shared across screens)"
    should_quit:     "bool — signals the run loop to exit"
    last_error:      "Option<String> — displayed in the status bar on reload failure"

  screen_enum:
    Profiles:      "Profile manager screen"
    Capabilities:  "Capability browser screen"
    Packs:         "Pack manager screen"

  cap_view_enum:
    Namespaces:       "Top level — list of namespace groups"
    Listing(ns):      "Second level — capabilities within a namespace"
    Detail(name):     "Third level — full detail for a single capability"

  modal_enum:
    CreateProfile:    "New profile form — name + description"
    CreateCapability: "New capability form — name, backend type, command, risk"
    CreatePack:       "New pack form — name, description, author"

  data_loading:
    on_startup:    "App::new() loads all data once"
    on_reload:     >
      App::reload() re-reads ClixState, registry, profiles, and packs from disk.
      Resets cursor to 0 and cap_view to Namespaces to avoid stale references.
      Any error is stored in last_error and shown in the status bar.
    trigger:       "r key"

  first_run_behavior: >
    On first launch, if no profiles are installed, the base pack is auto-installed
    from the bundled defaults. This ensures the Profiles screen is never empty
    and gives the user a working starting point immediately.


# ─────────────────────────────────────────────────────────────────────────────
# LAYOUT
# ─────────────────────────────────────────────────────────────────────────────
layout:
  description: "Three-row vertical layout applied to every screen"
  rows:
    tab_bar:
      height:    "1 line"
      content:   "[1] Profiles   [2] Capabilities   [3] Packs"
      style:     "Active screen tab is bold + rust orange (#E75B2A or closest terminal color)"
    content_area:
      height:    "Remaining terminal height"
      content:   "Active screen renderer fills this area"
    status_bar:
      height:    "1 line"
      content:
        normal:  "q:quit  r:reload  ←/→:tabs  ↑/↓:select  Enter:action  Esc:back"
        error:   "Last error message displayed in red when last_error is set"

  modals:
    description: >
      Create/edit forms render as centered overlay panels on top of the
      content area. The content area is still visible but dimmed behind
      the modal. Tab/Enter advances fields; Esc cancels.


# ─────────────────────────────────────────────────────────────────────────────
# SCREENS
# ─────────────────────────────────────────────────────────────────────────────
screens:

  profiles:
    file: "crates/clix-cli/src/tui/screens/profiles.rs"
    description: >
      Shows all installed profiles. Active profiles are marked with ●;
      inactive with ○. Enter toggles the selected profile on or off
      and persists the change to ~/.clix/config.yaml immediately.
      A solid base profile ships with clix and is visible on first launch.
    layout:
      type: full-width list
      footer: "n:new profile"
    list_item_format: "<marker> <name>  <description>"
    markers:
      active:   "●"
      inactive: "○"
    actions:
      enter:    "Toggle selected profile active/inactive — writes config.yaml"
      n:        "Open CreateProfile modal"
      up/down:  "Move cursor"
    create_profile_modal:
      fields:
        - name: "Profile name (required)"
        - description: "Short description (optional)"
        - capabilities: "Comma-separated capability names to include (optional — editable later)"
      on_confirm: >
        Writes a new ProfileManifest YAML to ~/.clix/profiles/<name>.yaml,
        then reloads the profile list.
    state_persistence: >
      toggle_profile() calls ClixState::load(), mutates active_profiles,
      serializes config back to YAML, and writes to config_path.
      self.active_profiles is updated in memory immediately after.
    empty_state: "Shows 'No profiles installed — press n to create one' message"

  capabilities:
    file: "crates/clix-cli/src/tui/screens/capabilities.rs"
    description: >
      Three-level drill-down browser for the capability registry.
      Uses CapView enum to track which level is displayed.
      Base capabilities (system.date, system.echo) are always present.
    layout:
      footer_at_namespaces: "n:new capability"
    levels:
      namespaces:
        cap_view:      "CapView::Namespaces"
        content:       "List of namespace groups with capability count"
        item_format:   "<namespace>  (<N> capabilities)"
        data_source:   "CapabilityRegistry::namespaces()"
        action_enter:  "Drill into CapView::Listing(ns)"
        action_esc:    "Quit the TUI"
        action_n:      "Open CreateCapability modal"

      listing:
        cap_view:      "CapView::Listing(ns)"
        content:       "Capabilities within the selected namespace"
        item_format:   "<name>  <description>"
        data_source:   "CapabilityRegistry::by_namespace(ns)"
        action_enter:  "Drill into CapView::Detail(name)"
        action_esc:    "Return to CapView::Namespaces"

      detail:
        cap_view:      "CapView::Detail(name)"
        content:       "Full capability manifest fields"
        fields_shown:
          - "Name"
          - "Description"
          - "Backend (type + command or url)"
          - "Risk level"
          - "Input schema (pretty-printed JSON)"
        data_source:   "CapabilityRegistry::get(name)"
        action_esc:    >
          Return to CapView::Listing(ns) — namespace is re-derived from the
          capability name via CapabilityRegistry::group_key(name)
        missing_capability: "Renders 'Capability not found' panel if registry lookup fails"

    create_capability_modal:
      fields:
        - name:        "Capability name — dot-namespaced (e.g. git.status)"
        - description: "Short description"
        - backend:     "subprocess | builtin | remote (selector)"
        - command:     "Executable name (for subprocess)"
        - args:        "Space-separated args — use ${input.key} for dynamic values"
        - risk:        "low | medium | high | critical (selector)"
      on_confirm: >
        Writes a new CapabilityManifest YAML to ~/.clix/capabilities/<name>.yaml,
        then reloads the registry.

  packs:
    file: "crates/clix-cli/src/tui/screens/packs.rs"
    description: >
      Split-panel view. Left panel shows all installed packs. Right panel
      shows details for the currently selected pack. The base pack ships
      with clix and is always visible.
    layout:
      type:          "Horizontal split"
      left_width:    "35%"
      right_width:   "65%"
      footer:        "n:new pack  i:install from path  Enter:manage"
    left_panel:
      content:       "Pack list — name and version"
      item_format:   "<name> v<version>"
    right_panel:
      content:       "Pack detail for selected pack"
      fields_shown:
        - "Name"
        - "Version"
        - "Author"
        - "Description"
        - "Capabilities (count + bulleted list)"
        - "Profiles (count + bulleted list, if any)"
    actions:
      up/down:  "Navigate pack list — detail panel auto-updates"
      n:        "Open CreatePack modal"
      i:        "Prompt for a local path or .clixpack.zip to install"
      enter:    "Open pack management view — install/remove/inspect"
    create_pack_modal:
      fields:
        - name:        "Pack name (required)"
        - description: "Short description (optional)"
        - author:      "Author name (optional)"
      on_confirm: >
        Runs clix pack scaffold logic to create the pack directory structure
        at ~/.clix/packs/<name>/, then opens the pack in the management view.
    empty_state: "Shows 'No packs installed — press i to install or n to create'"


# ─────────────────────────────────────────────────────────────────────────────
# KEY BINDINGS
# ─────────────────────────────────────────────────────────────────────────────
key_bindings:
  global:
    q:          "Quit the TUI (not active while a modal is open)"
    ctrl_c:     "Force quit — always works"
    r:          "Reload all data from disk — resets cursor and cap_view"
    Esc:        "Close modal (if open) / navigate back / quit from top level"

  tab_navigation:
    left_arrow:  "Switch to previous tab"
    right_arrow: "Switch to next tab"
    "1":         "Jump directly to Profiles screen"
    "2":         "Jump directly to Capabilities screen"
    "3":         "Jump directly to Packs screen"
    note: >
      Tab key removed from navigation — arrows own left/right movement,
      digits own direct jump. Tab is reserved for advancing modal form fields.

  list_navigation:
    up_arrow:    "Move cursor up"
    down_arrow:  "Move cursor down"
    note: >
      j/k vim bindings removed. Arrow keys are the only cursor movement.
      This keeps the interaction model unambiguous for non-vim users.

  actions:
    Enter:
      profiles:            "Toggle selected profile active/inactive"
      capabilities_ns:     "Drill into namespace"
      capabilities_list:   "Drill into capability detail"
      capabilities_detail: "No-op"
      packs:               "Open pack management view"
    n:
      profiles:            "Open CreateProfile modal"
      capabilities_ns:     "Open CreateCapability modal"
      packs:               "Open CreatePack modal"
    i:
      packs:               "Prompt for pack path to install"

  modal_navigation:
    Tab:         "Advance to next field"
    Shift_Tab:   "Return to previous field"
    Enter:       "Confirm and save"
    Esc:         "Cancel and close"

  cursor_bounds: >
    cursor_down clamps to list_len - 1 (no wrap-around).
    cursor_up clamps at 0.
    Empty lists receive ListState::select(None) — no highlight rendered.


# ─────────────────────────────────────────────────────────────────────────────
# DEFAULT / BASE CONTENT
# ─────────────────────────────────────────────────────────────────────────────
default_content:
  description: >
    clix must never show an empty TUI on first launch. The base pack is
    bundled with the binary and auto-installed to ~/.clix on first run.

  base_pack:
    location:    "packs/base/ in the clix source repo — bundled into the binary"
    auto_install: "clix init installs it; clix tui checks and installs if missing"
    contents:
      capabilities:
        - system.date:   "Return current UTC date/time — builtin"
        - system.echo:   "Echo a message — builtin"
      profiles:
        - base:          "Default profile — includes system.date and system.echo"
    auto_activate: "The base profile is activated by default in new installs"

  recommended_starter_packs:
    description: >
      These packs ship in the clix repo and are available to install from
      the TUI on first launch or via clix pack install.
    packs:
      - gcloud-readonly:   "Read-only gcloud capabilities (list projects, resources)"
      - gcloud-aiplatform: "Vertex AI model/endpoint/job inspection"
      - kubectl-observe:   "Read-only kubectl inspection + cluster-health workflow"
      - gh-readonly:       "Read-only GitHub CLI capabilities (list repos)"

  onboarding_flow: >
    On first clix tui launch:
    1. base pack is installed and base profile is activated automatically
    2. Profiles screen shows the base profile with ● active marker
    3. Packs screen shows the base pack in the list
    4. A hint in the status bar suggests: "i to install more packs"


# ─────────────────────────────────────────────────────────────────────────────
# SOURCE FILE MAP
# ─────────────────────────────────────────────────────────────────────────────
source_map:
  entry_point:         "crates/clix-cli/src/commands/tui.rs"
  terminal_lifecycle:  "crates/clix-cli/src/tui/mod.rs"
  state_machine:       "crates/clix-cli/src/tui/app.rs"
  profiles_screen:     "crates/clix-cli/src/tui/screens/profiles.rs"
  capabilities_screen: "crates/clix-cli/src/tui/screens/capabilities.rs"
  packs_screen:        "crates/clix-cli/src/tui/screens/packs.rs"
  screen_exports:      "crates/clix-cli/src/tui/screens/mod.rs"


# ─────────────────────────────────────────────────────────────────────────────
# FUTURE SCREENS (v2 candidates)
# ─────────────────────────────────────────────────────────────────────────────
future_screens:
  receipt_log:
    description: "Scrollable audit log viewer — tail receipts.db in real time"
    complexity:  Low
    data_source: "ReceiptStore::list()"

  policy_editor:
    description: "Structured form for editing policy.yaml rules"
    complexity:  High
    note:        "Requires form validation and YAML round-trip"

  external_cli_wizard:
    description: "Multi-step wizard for onboarding a new external CLI as a pack"
    complexity:  Medium-High
    note:        "Mirrors clix pack onboard — wizard-style form flow"

  pack_install_progress:
    description: "Progress indicator for pack install/bundle operations"
    complexity:  Low
